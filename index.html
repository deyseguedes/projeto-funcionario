<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionario</title>
</head>
<body>
    <h2>Cadastro de Funcionario</h2>
    <form action="processa.php" method="post">
        <label for="nome">Nome:</label>
        <br>
        <input type="text" name="nome" id="nome" placeholder="Digite o nome do funcionario">
        <br><br>
        <label for="cargo">Cargo:</label>
        <br>
        <select name="cargo" id="cargo">
            <option value="gerente">Funcionario</option>
            <option value="vendedor">Gerente</option>
    </select>
    <br><br>
    <label for="salario">Salário:</label>
    <br>
    <input type="number" name="salario" id="salario" placeholder="Digite o salário do funcionario">
    <br><br>
    <input type="submit" value="Cadastrar">
    </form>

</body>
</html>
